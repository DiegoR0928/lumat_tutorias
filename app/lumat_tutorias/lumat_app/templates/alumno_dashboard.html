{% extends 'base.html' %}

{% block content %}

<div class="container-fluid mt-4">
    <div class="row">

        <!-- 🔹 PANEL LATERAL -->
        <div class="col-md-3 col-lg-2">
            <div class="card shadow-sm border-0">
                <div class="card-body p-3">

                    <h6 class="text-muted mb-3">Menú</h6>

                    <div class="d-grid gap-2">
                        <a href="{% url 'lumat_app:seminario' %}" class="btn btn-outline-dark text-start">
                            📚 Seminario
                        </a>

                        <a href="{% url 'lumat_app:perfil' %}" class="btn btn-outline-dark text-start">
                            👤 Perfil
                        </a>
                    </div>

                </div>
            </div>
        </div>

        <!-- 🔹 PANEL DERECHO -->
        <div class="col-md-9 col-lg-10">

            <!-- 📌 NOTA DEL SEMINARIO -->
            <div class="card shadow-sm border-0 mb-4">
                <div class="card-body">

                    <h5 class="card-title">Próximo seminario</h5>

                    <div class="alert alert-info mb-0">
                        📅 Tu próximo seminario está programado para:
                        <strong>15 de mayo de 2026</strong>
                    </div>

                </div>
            </div>

            <!-- 🔹 MINI MENÚ -->
            <div class="card shadow-sm border-0">
                <div class="card-body">

                    <div class="row g-3 text-center">

                        <div class="col-6 col-md-3">
                            <button class="btn btn-dark w-100">
                                📅 Calendario
                            </button>
                        </div>

                        <div class="col-6 col-md-3">
                            <button class="btn btn-dark w-100">
                                👨‍🏫 Cambiar tutor
                            </button>
                        </div>

                        <div class="col-6 col-md-3">
                            <button class="btn btn-dark w-100">
                                🕒 Cambiar fecha
                            </button>
                        </div>

                        <div class="col-6 col-md-3">
                            <button class="btn btn-dark w-100">
                                📄 Historial
                            </button>
                        </div>

                    </div>

                </div>
            </div>

        </div>

    </div>
</div>

{% endblock %}
